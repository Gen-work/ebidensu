name: Mirror to GitLab

on:
  push:
    branches: ["**"]
  delete:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to GitLab
        run: |
          git remote add gitlab https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/Tokumei_M/ebidensu.git
          # Mirror the remote-tracking refs: on a branch push the checkout only
          # creates that one local branch, so pushing refs/heads/* with --prune
          # asked GitLab to delete every other branch (incl. the protected
          # default) and the whole push was rejected.
          git remote set-head origin --delete || true
          git push --force --prune gitlab +refs/remotes/origin/*:refs/heads/* +refs/tags/*:refs/tags/*
